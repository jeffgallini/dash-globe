name: Publish package

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-package-main
  cancel-in-progress: false

jobs:
  prepare-release:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve release version
        id: version
        run: |
          current_version="$(python script/release_version.py current)"
          if git rev-parse "refs/tags/v${current_version}" >/dev/null 2>&1; then
            version="$(python script/release_version.py bump patch)"
          else
            version="${current_version}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

      - name: Install package test and build dependencies
        working-directory: dash_globe
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r tests/requirements.txt build twine

      - name: Run package tests
        working-directory: dash_globe
        run: python -m pytest tests -q

      - name: Build distributions
        working-directory: dash_globe
        run: python -m build

      - name: Validate distributions
        working-directory: dash_globe
        run: python -m twine check dist/*

      - name: Commit release version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dash_globe/package.json dash_globe/dash_globe/package-info.json dash_globe/Project.toml
          git diff --cached --quiet || git commit -m "chore: release ${{ steps.version.outputs.tag }} [skip release]"

      - name: Tag release
        run: git tag "${{ steps.version.outputs.tag }}"

      - name: Push release commit and tag
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dash_globe/dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: prepare-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/dash-globe/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
